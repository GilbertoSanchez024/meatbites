<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Meat Bites</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="Meat Bites">
            </div>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="producto.html">Producto</a></li>
                <li><a href="nutricion.html">Nutrición</a></li>
                <li><a href="sabores.html">Sabores</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="page">
        <h1>Contáctanos</h1>
        
        <div class="contact-grid">
            <!-- Columna izquierda: Información comercial agrupada -->
            <div class="contact-details">
                <div>
                    <h3>Instagram</h3>
                    <p>@meatbitess</p>
                </div>
                <div>
                    <h3>WhatsApp</h3>
                    <p>+52 669 XXX XXXX</p>
                </div>
                <div>
                    <h3>Dirección</h3>
                    <p> Av Jacarandas, Mazatlán, Sinaloa</p>
                </div>
                <div>
                    <h3>Horario</h3>
                    <p>Lunes a Sábado<br>9:00 AM - 8:00 PM</p>
                </div>
            </div>

            <!-- Columna derecha: Formulario interactivo -->
            <form>
                <input type="text" placeholder="Nombre" required>
                <input type="email" placeholder="Correo" required>
                <textarea placeholder="Mensaje" required></textarea>
                <button type="submit">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    <footer>
        <img src="logo.png" alt="logo">
        <p>© 2026 Meat Bites</p>
    </footer>

</body>
</html>
